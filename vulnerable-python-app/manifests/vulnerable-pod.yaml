apiVersion: v1
kind: Pod
metadata:
  name: vulnerable-python-exploit-pod
spec:
  containers:
  - name: python-app
    image: peachycloudsecurity/vulnerable-python-app:latest
    securityContext:
      privileged: true
    volumeMounts:
    - name: host-root
      mountPath: /mnt/host
  volumes:
  - name: host-root
    hostPath:
      path: /
      type: Directory
